name: "CD - Publish to npm (dry run)"

on:
  workflow_call:
    inputs:
      tag:
        description: "Git tag to publish (e.g., v0.1.0)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g., v0.1.0)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm run ci

      - name: Publish (dry run)
        run: |
          echo "=== DRY RUN — would publish from tag ${{ inputs.tag }} ==="
          pnpm pack --pack-destination /tmp
          echo ""
          echo "Package contents:"
          ls -lh /tmp/*.tgz
          echo ""
          pnpm publish --access public --no-git-checks --dry-run
