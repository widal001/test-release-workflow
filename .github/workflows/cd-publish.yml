name: "CD - Publish to npm (dry run)"

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g., v0.1.0)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Determine ref
        id: config
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "ref=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.config.outputs.ref }}

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm run ci

      - name: Publish (dry run)
        run: |
          echo "=== DRY RUN — would publish from tag ${{ steps.config.outputs.ref }} ==="
          pnpm pack --pack-destination /tmp
          echo ""
          echo "Package contents:"
          ls -lh /tmp/*.tgz
          echo ""
          pnpm publish --access public --no-git-checks --dry-run
