name: "CD - Create Release"

on:
  push:
    branches:
      - main

jobs:
  # Release-please analyzes conventional commit messages since the last release
  # and either creates or updates a release PR with:
  #   - A version bump in package.json
  #   - An updated CHANGELOG.md
  #
  # When that release PR is merged, release-please creates a git tag and
  # GitHub Release, which triggers the cd-publish.yml workflow.
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
