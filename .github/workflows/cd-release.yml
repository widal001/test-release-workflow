name: "CD - Create Release"

on:
  push:
    branches:
      - main

jobs:
  # Release-please analyzes conventional commit messages since the last release
  # and either creates or updates a release PR with:
  #   - A version bump in package.json
  #   - An updated CHANGELOG.md
  #
  # When that release PR is merged, release-please creates a git tag and
  # GitHub Release, then triggers the publish workflow.
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/cd-publish.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
